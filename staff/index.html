<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smooy CRM - Staff</title>
  <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="card brandHeaderWrap">
      <div class="brandRow" style="position:relative;">
        <img class="brandOverlayLogo" src="../assets/smooy-overlay.png" alt="" aria-hidden="true" />
        <div style="min-width:0;">
          <div class="title" id="staffStoreTitle">Smooy Pasir Ris Mall</div>
          <p class="subtitle" id="staffStoreSubtitle">Welcome to the Smooy PRM Loyalty Club</p>
        </div>
      </div>
    </header>

    <section id="viewLogin" class="section card">
      <h2 style="margin:0 0 10px 0; font-size:16px;">Staff login</h2>
      <div class="field">
        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" placeholder="staff@email.com" />
      </div>
      <div class="field">
        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" placeholder="••••••••" />
      </div>
      <div class="actions" style="grid-template-columns: 1fr;">
        <button id="loginBtn" class="btn btn-primary btn-small">Log in</button>
      </div>
      <div id="loginError" class="helper" style="color: rgba(255,93,122,0.95); display:none;"></div>
    </section>

    <section id="viewMain" class="section card" style="display:none;">
      <div class="row" style="align-items:center;">
        <div style="min-width:0;">
          <h2 style="margin:0; font-size:16px;" id="mainHeading">Store</h2>
          <p class="subtitle" id="mainSubHeading" style="margin-top:6px;"></p>
        </div>
        <div style="display:flex; justify-content:flex-end;">
          <button id="logoutBtn" class="btn btn-ghost btn-small" style="width:auto; white-space:nowrap;">Log out</button>
        </div>
      </div>

      <div class="section">
        <h3 style="margin: 14px 0 8px 0; font-size:14px;">Find customer</h3>
        <div class="field">
          <label for="staffPhoneInput">Customer phone (Singapore)</label>
          <input id="staffPhoneInput" inputmode="tel" placeholder="e.g. 9781 3023" />
        </div>
        <div class="actions" style="grid-template-columns: 1fr 1fr;">
          <button id="searchCustomerBtn" class="btn btn-primary btn-small">Search</button>
          <button id="clearCustomerBtn" class="btn btn-ghost btn-small">Clear</button>
        </div>
        <div id="searchError" class="helper" style="color: rgba(255,93,122,0.95); display:none;"></div>
      </div>

      <div id="customerArea" style="display:none;">
        <div class="item" style="margin-top: 12px;">
          <div class="itemTitle" id="customerName">Customer</div>
          <p class="itemSub" id="customerPhoneLine"></p>
        </div>

        <div class="actions" style="grid-template-columns: 1fr;">
          <button id="grantStampBtn" class="btn btn-primary btn-small">Grant next stamp</button>
        </div>
        <div id="grantError" class="helper" style="color: rgba(255,93,122,0.95); display:none;"></div>

        <div class="section">
          <h3 style="margin: 14px 0 8px 0; font-size:14px;">Card</h3>
          <div class="stamps" id="stampsGrid"></div>
        </div>

        <div class="section">
          <h3 style="margin: 14px 0 8px 0; font-size:14px;">Redeem / expire</h3>
          <div class="list" id="rewardActionList" style="margin-top: 0;"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="../shared/config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
